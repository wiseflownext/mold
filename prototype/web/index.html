<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>模具管家 - 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--primary:#1677FF;--primary-bg:rgba(22,119,255,.1);--primary-dark:#0958D9;
--green:#52C41A;--blue:#1677FF;--orange:#FA8C16;--red:#F5222D;--gray:#8C8C8C;--yellow:#FAAD14;--purple:#722ED1;--dark:#434343;
--text:#1F1F1F;--text2:#434343;--text3:#8C8C8C;
--border:#F0F0F0;--bg:#F5F5F5;--card:#FFF;--head-bg:#FAFAFA;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text2);font-size:14px;overflow:hidden;height:100vh}
a{color:var(--primary);text-decoration:none;cursor:pointer}
button{cursor:pointer;font-family:inherit}

/* Layout */
.layout{display:flex;height:100vh}
.sidebar{width:220px;background:#001529;color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-logo{height:56px;display:flex;align-items:center;padding:0 20px;gap:10px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo .dot{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#1677FF,#69B1FF);display:flex;align-items:center;justify-content:center}
.sidebar-logo span{font-size:16px;font-weight:600}
.sidebar-menu{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-menu::-webkit-scrollbar{width:4px}
.sidebar-menu::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
.menu-group{margin-bottom:4px}
.menu-group-title{padding:8px 20px;font-size:12px;color:rgba(255,255,255,.35);text-transform:uppercase}
.menu-item{display:flex;align-items:center;padding:10px 20px;color:rgba(255,255,255,.65);cursor:pointer;font-size:14px;transition:all .15s;gap:10px;border-right:3px solid transparent}
.menu-item:hover{color:#fff;background:rgba(255,255,255,.06)}
.menu-item.active{color:#fff;background:var(--primary);border-right-color:var(--primary)}
.menu-item svg{width:16px;height:16px;flex-shrink:0;opacity:.8}
.menu-item.active svg{opacity:1}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.breadcrumb{font-size:14px;color:var(--text3)}
.breadcrumb span{color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:16px}
.bell{position:relative;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg)}
.bell-badge{position:absolute;top:0;right:0;background:var(--red);color:#fff;font-size:10px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.user-info{display:flex;align-items:center;gap:8px;cursor:pointer}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#1677FF,#69B1FF);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:24px}

/* Cards */
.stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:8px;padding:20px;position:relative;overflow:hidden}
.stat-card .label{font-size:14px;color:var(--text3)}
.stat-card .value{font-size:32px;font-weight:700;margin-top:8px}
.stat-card .sub{font-size:12px;color:var(--text3);margin-top:4px}
.stat-card .icon-bg{position:absolute;right:16px;top:16px;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center}

/* Charts */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:#fff;border-radius:8px;padding:20px}
.chart-card h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:16px}
.chart-placeholder{height:200px;display:flex;align-items:flex-end;gap:8px;padding:0 4px}
.bar{border-radius:4px 4px 0 0;flex:1;position:relative;transition:height .3s}
.bar .bar-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--text3);white-space:nowrap}
.bar .bar-value{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:600}
.line-chart{height:200px;position:relative}
.line-chart svg{width:100%;height:100%}
.pie-container{display:flex;align-items:center;gap:24px;justify-content:center}
.pie-legend{display:flex;flex-direction:column;gap:8px}
.pie-legend-item{display:flex;align-items:center;gap:8px;font-size:13px}
.pie-dot{width:10px;height:10px;border-radius:50%}

/* Table */
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.page-header h2{font-size:20px;font-weight:600;color:var(--text)}
.btn-group{display:flex;gap:8px}
.btn-sm{padding:6px 16px;border-radius:6px;font-size:13px;border:1px solid var(--border);background:#fff;color:var(--text2)}
.btn-sm:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-sm.primary:hover{background:var(--primary-dark)}
.btn-sm.danger{color:var(--red);border-color:var(--red)}
.filter-area{background:#fff;border-radius:8px;padding:16px 20px;margin-bottom:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.filter-item{display:flex;flex-direction:column;gap:4px}
.filter-item label{font-size:12px;color:var(--text3)}
.filter-item input,.filter-item select{height:32px;border:1px solid #D9D9D9;border-radius:6px;padding:0 8px;font-size:13px;outline:none}
.filter-item input:focus,.filter-item select:focus{border-color:var(--primary)}
.filter-actions{display:flex;align-items:flex-end;gap:8px}
.table-wrap{background:#fff;border-radius:8px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--head-bg)}
th{padding:12px 16px;text-align:left;font-size:13px;font-weight:500;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
tr:hover td{background:#FAFAFA}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500;white-space:nowrap}
.progress-bar{width:80px;height:6px;border-radius:3px;background:#F0F0F0;display:inline-block;vertical-align:middle;margin-right:6px}
.progress-fill{height:100%;border-radius:3px}
.action-link{color:var(--primary);margin-right:12px;cursor:pointer;font-size:13px}
.action-link.danger{color:var(--red)}
.pagination{display:flex;justify-content:space-between;align-items:center;padding:12px 16px}
.pagination .info{font-size:13px;color:var(--text3)}
.page-btns{display:flex;gap:4px}
.page-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;background:#fff}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-btn:hover{border-color:var(--primary);color:var(--primary)}
.page-btn.active:hover{color:#fff}

/* Detail */
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;background:#fff;border-radius:8px;padding:24px;margin-bottom:16px}
.detail-header .mold-no{font-size:24px;font-weight:700;color:var(--text)}
.detail-header .meta{margin-top:8px;display:flex;gap:16px;font-size:13px;color:var(--text3)}
.detail-header .actions{display:flex;gap:8px}
.detail-tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);padding:0 20px;border-radius:8px 8px 0 0}
.detail-tab{padding:14px 16px;font-size:14px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent}
.detail-tab.active{color:var(--primary);font-weight:500;border-bottom-color:var(--primary)}
.detail-tab-content{background:#fff;border-radius:0 0 8px 8px;padding:20px;min-height:300px}

/* Login */
#loginPage{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#001529 0%,#003A70 50%,#1677FF 100%);display:flex;z-index:1000}
#loginPage.hidden{display:none}
.login-left{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 80px;color:#fff}
.login-left h1{font-size:36px;font-weight:700;margin-bottom:12px}
.login-left p{font-size:16px;opacity:.7}
.login-right{width:420px;background:#fff;display:flex;align-items:center;justify-content:center}
.login-form{width:320px}
.login-form h2{font-size:24px;font-weight:600;color:var(--text);margin-bottom:32px}
.login-form .form-group{margin-bottom:20px}
.login-form label{font-size:13px;color:var(--text3);display:block;margin-bottom:6px}
.login-form input{width:100%;height:44px;border:1px solid #D9D9D9;border-radius:8px;padding:0 14px;font-size:14px;outline:none}
.login-form input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(22,119,255,.1)}
.login-form button{width:100%;height:44px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:500;margin-top:8px}
.login-form button:hover{background:var(--primary-dark)}

/* Modal */
.modal-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center}
.modal-mask.show{display:flex}
.modal{background:#fff;border-radius:8px;width:560px;max-height:80vh;display:flex;flex-direction:column}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:16px;font-weight:600}
.modal-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--text3);border-radius:50%}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-body .form-group{margin-bottom:16px}
.modal-body label{font-size:13px;color:var(--text);font-weight:500;display:block;margin-bottom:6px}
.modal-body input,.modal-body select,.modal-body textarea{width:100%;height:36px;border:1px solid #D9D9D9;border-radius:6px;padding:0 10px;font-size:13px;outline:none}
.modal-body textarea{height:80px;padding:8px 10px;resize:none}
.modal-body input:focus,.modal-body select:focus,.modal-body textarea:focus{border-color:var(--primary)}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:12px 24px;border-top:1px solid var(--border)}

/* Toast */
.toast{position:fixed;top:24px;right:24px;background:#fff;border-radius:8px;padding:12px 20px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:600;display:none;align-items:center;gap:10px;font-size:14px;border-left:4px solid var(--green)}
.toast.show{display:flex}
</style>
</head>

}

function openModal(title,type){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=modalForms[type]||'';
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function showToast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toastText').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function doLogin(){
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainLayout').style.display='flex';
  renderMenu();
  navTo('dashboard');
}
